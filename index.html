<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LXT 我喜欢你</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            overflow: hidden;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 600;
            letter-spacing: -0.03em;
            margin-bottom: 20px;
            color: #fff;
            transition: all 0.3s ease;
        }

        .subtitle {
            font-size: 1rem;
            color: #666;
            margin-bottom: 50px;
            font-weight: 400;
        }

        .heart {
            width: 80px;
            height: 80px;
            margin: 0 auto 50px;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
            animation: pulse 2s infinite;
        }

        .heart:hover {
            transform: scale(1.1);
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 64px;
            background: #ff2d5f;
            border-radius: 40px 40px 0 0;
        }

        .heart::before {
            left: 0;
            transform: rotate(-45deg);
            transform-origin: bottom right;
        }

        .heart::after {
            right: 0;
            transform: rotate(45deg);
            transform-origin: bottom left;
        }

        .message {
            font-size: 1.1rem;
            color: #888;
            line-height: 2;
            margin-bottom: 40px;
            transition: all 0.3s ease;
        }

        .message span {
            color: #fff;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 14px 30px;
            font-size: 0.95rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: scale(0.95) translateY(0);
        }

        .btn-secondary {
            background: transparent;
            color: #666;
            border: 1px solid #333;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #444;
        }

        .hidden {
            display: none;
        }

        .alternative-message {
            font-size: 1.2rem;
            color: #888;
            line-height: 1.8;
            margin: 30px 0;
            padding: 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }

        .alternative-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .alternative-message span {
            color: #aaa;
            font-style: italic;
        }

        .back-btn {
            margin-top: 20px;
            background: transparent;
            color: #666;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 8px 16px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .back-btn.show {
            opacity: 1;
            transform: translateY(0);
        }

        .back-btn:hover {
            color: #fff;
        }

        /* 按钮点击动画 */
        @keyframes buttonClick {
            0% { transform: scale(1); }
            50% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        /* 心形跳动动画 */
        @keyframes pulse {
            0% { transform: scale(1); }
            15% { transform: scale(1.1); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
            60% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        /* 文字淡入动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-text {
            animation: fadeInUp 0.5s ease forwards;
        }

        /* 粒子效果 */
        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 107, 157, 0.7);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title" id="mainTitle">LXT 我喜欢你</h1>
        <p class="subtitle" id="subtitle">—— 一份简约的告白 ——</p>

        <div class="heart" id="heart" onclick="heartClick()"></div>

        <p class="message" id="message">
            每天都想见到你<br>
            <span>你的笑容是我最大的动力</span><br>
            想和你一起看遍世间风景
        </p>

        <div class="buttons">
            <button class="btn" id="likeBtn" onclick="showLikeResponse()">我也喜欢你</button>
            <button class="btn btn-secondary" id="dislikeBtn" onclick="showDislikeResponse()">我不喜欢你</button>
        </div>

        <div class="alternative-message" id="alternativeMessage">
            其实我只是喜欢你，<br>
            不需要你给出任何回应<br>
            <span>这份心意只是属于我自己的</span>
        </div>

        <button class="back-btn" id="backBtn" onclick="resetPage()">← 返回</button>

        <p class="footer" id="footer">Made with ♥</p>
    </div>

    <script>
        // 按钮点击动画
        function addClickAnimation(button) {
            button.style.animation = 'buttonClick 0.3s ease';
            setTimeout(() => {
                button.style.animation = '';
            }, 300);

            // 创建点击粒子效果
            createClickParticles(button);
        }

        // 创建点击粒子效果
        function createClickParticles(element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                document.body.appendChild(particle);

                // 随机位置和方向
                const angle = (i / 8) * Math.PI * 2;
                const distance = 30 + Math.random() * 20;
                const endX = centerX + Math.cos(angle) * distance;
                const endY = centerY + Math.sin(angle) * distance;

                particle.style.left = centerX + 'px';
                particle.style.top = centerY + 'px';

                // 动画
                setTimeout(() => {
                    particle.style.transition = 'all 0.4s ease-out';
                    particle.style.opacity = '1';
                    particle.style.left = endX + 'px';
                    particle.style.top = endY + 'px';
                    particle.style.transform = 'scale(0)';
                }, 10);

                // 移除粒子
                setTimeout(() => {
                    particle.remove();
                }, 400);
            }
        }

        // 心形点击效果
        function heartClick() {
            const heart = document.getElementById('heart');
            heart.style.animation = 'none';
            heart.offsetHeight; // 触发重绘
            heart.style.animation = 'pulse 0.3s ease';

            // 创建心形粒子效果
            const rect = heart.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.background = '#ff2d5f';
                document.body.appendChild(particle);

                const angle = (i / 12) * Math.PI * 2;
                const distance = 40 + Math.random() * 30;
                const endX = centerX + Math.cos(angle) * distance;
                const endY = centerY + Math.sin(angle) * distance;

                particle.style.left = centerX + 'px';
                particle.style.top = centerY + 'px';

                setTimeout(() => {
                    particle.style.transition = 'all 0.5s ease-out';
                    particle.style.opacity = '1';
                    particle.style.left = endX + 'px';
                    particle.style.top = endY + 'px';
                    particle.style.transform = 'scale(0)';
                }, 10);

                setTimeout(() => {
                    particle.remove();
                }, 500);
            }
        }

        // 显示喜欢回应
        function showLikeResponse() {
            const button = document.getElementById('likeBtn');
            addClickAnimation(button);

            setTimeout(() => {
                document.getElementById('mainTitle').textContent = '❤ 我们在一起吧';
                document.getElementById('subtitle').textContent = '—— 两情相悦的喜悦 ——';
                document.getElementById('message').innerHTML = '从此以后<br><span>每一天都值得期待</span><br>与你共度余生';
                document.getElementById('heart').style.background = 'linear-gradient(135deg, #ff6b9d 0%, #ff2d5f 100%)';
                button.textContent = '太好了';
                document.getElementById('dislikeBtn').style.display = 'none';
                document.getElementById('footer').textContent = '双向奔赴的幸福';

                // 添加文字动画
                document.getElementById('mainTitle').classList.add('animate-text');
                setTimeout(() => {
                    document.getElementById('mainTitle').classList.remove('animate-text');
                }, 500);
            }, 300);
        }

        // 显示不喜欢回应
        function showDislikeResponse() {
            const button = document.getElementById('dislikeBtn');
            addClickAnimation(button);

            setTimeout(() => {
                document.getElementById('mainTitle').textContent = '❤ 我喜欢你';
                document.getElementById('subtitle').textContent = '—— 一份心意 ——';
                document.getElementById('message').classList.add('hidden');
                document.getElementById('heart').style.opacity = '0.3';

                // 显示替代消息
                const altMessage = document.getElementById('alternativeMessage');
                altMessage.classList.add('show');

                // 显示返回按钮
                document.getElementById('backBtn').classList.add('show');

                document.getElementById('likeBtn').style.display = 'none';
                document.getElementById('dislikeBtn').style.display = 'none';
                document.getElementById('footer').textContent = '不打扰是我的温柔';

                // 添加文字动画
                altMessage.classList.add('animate-text');
                setTimeout(() => {
                    altMessage.classList.remove('animate-text');
                }, 500);
            }, 300);
        }

        // 重置页面
        function resetPage() {
            const button = document.getElementById('backBtn');

            setTimeout(() => {
                document.getElementById('mainTitle').textContent = 'LXT 我喜欢你';
                document.getElementById('subtitle').textContent = '—— 一份简约的告白 ——';
                document.getElementById('message').classList.remove('hidden');
                document.getElementById('message').innerHTML = '每天都想见到你<br><span>你的笑容是我最大的动力</span><br>想和你一起看遍世间风景';
                document.getElementById('heart').style.opacity = '1';
                document.getElementById('heart').style.background = '';
                document.getElementById('alternativeMessage').classList.remove('show');
                document.getElementById('backBtn').classList.remove('show');
                document.getElementById('likeBtn').style.display = 'inline-block';
                document.getElementById('dislikeBtn').style.display = 'inline-block';
                document.getElementById('likeBtn').textContent = '我也喜欢你';
                document.getElementById('footer').textContent = 'Made with ♥';

                // 添加文字动画
                document.getElementById('mainTitle').classList.add('animate-text');
                setTimeout(() => {
                    document.getElementById('mainTitle').classList.remove('animate-text');
                }, 500);
            }, 200);
        }

        // 初始化动画
        window.addEventListener('load', function() {
            document.querySelectorAll('.btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    this.style.animation = 'buttonClick 0.3s ease';
                    setTimeout(() => {
                        this.style.animation = '';
                    }, 300);
                });
            });
        });
    </script>
</body>
</html>
